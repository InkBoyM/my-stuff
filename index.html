<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Socials</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: #1e1e1e;
      --accent-x: #e8e8e8;
      --accent-discord: #5865F2;
      --accent-tiktok: #ff0050;
      --accent-threads: #aaaaaa;
      --accent-bluesky: #0085ff;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
    }

    .header { margin-bottom: 3rem; }

    .header .label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.5s 0.1s forwards;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }

    .header h1 span {
      display: block;
      color: var(--muted);
      font-size: 60%;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.3rem 1.5rem;
      background: var(--card);
      text-decoration: none;
      color: var(--text);
      position: relative;
      transition: background 0.15s ease;
      opacity: 0;
      animation: fadeUp 0.5s forwards;
    }

    .links.main .link-item:nth-child(1) { animation-delay: 0.35s; }
    .links.main .link-item:nth-child(2) { animation-delay: 0.45s; }
    .links.main .link-item:nth-child(3) { animation-delay: 0.55s; }

    .links.inactive .link-item:nth-child(1) { animation-delay: 0.75s; }
    .links.inactive .link-item:nth-child(2) { animation-delay: 0.85s; }

    .link-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.2s ease;
    }

    .link-item:hover::before { transform: scaleY(1); }
    .link-item:hover { background: #161616; }

    .link-item.x       { --accent: var(--accent-x); }
    .link-item.discord { --accent: var(--accent-discord); }
    .link-item.tiktok  { --accent: var(--accent-tiktok); }
    .link-item.threads { --accent: var(--accent-threads); }
    .link-item.bluesky { --accent: var(--accent-bluesky); }

    .icon-wrap {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
      fill: var(--accent);
      transition: transform 0.2s ease;
    }

    .link-item:hover .icon-wrap svg { transform: scale(1.15); }

    .link-text { flex: 1; }

    .link-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--accent);
    }

    .link-handle {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 0.2rem;
    }

    .arrow {
      font-size: 1rem;
      color: var(--muted);
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .link-item:hover .arrow {
      transform: translate(3px, -3px);
      color: var(--accent);
    }

    .section-divider {
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.5s 0.65s forwards;
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: right;
      opacity: 0;
      animation: fadeUp 0.5s 0.95s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
